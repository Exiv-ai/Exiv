axum.workspace = true
reqwest = { version = "0.12", features = ["json"] }
tower-http.workspace = true
futures.workspace = true
tokio-stream.workspace = true
async-stream.workspace = true

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
