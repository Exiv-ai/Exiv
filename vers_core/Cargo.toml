[package]
name = "vers_core"
version.workspace = true
edition.workspace = true

[dependencies]
vers_shared = { path = "../vers_shared" }
plugin_ks2_2 = { path = "../vers_plugins/plugin_ks2_2" }
plugin_deepseek = { path = "../vers_plugins/plugin_deepseek" }
plugin_cerebras = { path = "../vers_plugins/plugin_cerebras" }
plugin_cursor = { path = "../vers_plugins/plugin_cursor" }
plugin_python_bridge = { path = "../vers_plugins/plugin_python_bridge" }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
