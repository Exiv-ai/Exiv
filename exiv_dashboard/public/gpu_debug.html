<!DOCTYPE html>
<html>
<head>
    <title>GPU Detection Debug - RDNA3</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #4ec9b0; }
        .success { color: #4ec9b0; }
        .warning { color: #ce9178; }
        .error { color: #f48771; }
        pre { background: #252526; padding: 15px; border-left: 3px solid #007acc; overflow-x: auto; }
        .section { margin: 20px 0; padding: 15px; background: #252526; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔍 GPU Detection Debug for RDNA3</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');

        function addSection(title) {
            const section = document.createElement('div');
            section.className = 'section';
            section.innerHTML = `<h2>${title}</h2>`;
            output.appendChild(section);
            return section;
        }

        function log(section, msg, className = '') {
            const line = document.createElement('div');
            line.className = className;
            line.textContent = msg;
            section.appendChild(line);
            console.log(msg);
        }

        // Test 1: Performance Caveat Check
        const sec1 = addSection('Step 1: failIfMajorPerformanceCaveat Test');
        const canvas = document.createElement('canvas');
        let gl = canvas.getContext('webgl2', {
            failIfMajorPerformanceCaveat: true,
            powerPreference: 'high-performance',
        });

        if (!gl) {
            log(sec1, '❌ Context with failIfMajorPerformanceCaveat FAILED', 'warning');
            log(sec1, '→ This is expected on RDNA3 with performance caveat flag');
            log(sec1, '');
            log(sec1, 'Retrying without failIfMajorPerformanceCaveat...');

            gl = canvas.getContext('webgl2');
            if (gl) {
                log(sec1, '✅ Context without flag SUCCEEDED', 'success');
                log(sec1, '→ This should now proceed to GPU delegate (after fix)');
            } else {
                log(sec1, '❌ WebGL2 completely unavailable', 'error');
            }
        } else {
            log(sec1, '✅ Context with failIfMajorPerformanceCaveat SUCCEEDED', 'success');
            log(sec1, '→ No performance caveat detected');
        }

        if (gl) {
            // Test 2: Renderer Info
            const sec2 = addSection('Step 2: GPU Renderer Information');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || 'unknown';
                const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) || 'unknown';

                log(sec2, 'Renderer: ' + renderer, 'success');
                log(sec2, 'Vendor: ' + vendor, 'success');

                // Test 3: Blocklist Check
                const sec3 = addSection('Step 3: Blocklist/Warnlist Validation');
                const GPU_BLOCKLIST = [
                    /swiftshader/i,
                    /llvmpipe/i,
                    /software/i,
                    /microsoft basic/i,
                ];
                const GPU_WARNLIST = [
                    /radeon.*r9\s*2/i,
                    /radeon.*r7\s*2/i,
                    /radeon.*hd\s*7/i,
                    /radeon.*r9\s*3[78]/i,
                    /mali-t/i,
                    /intel.*hd.*4[0-9]{3}/i,
                ];

                let blocked = false;
                for (const pattern of GPU_BLOCKLIST) {
                    if (pattern.test(renderer)) {
                        log(sec3, '❌ BLOCKED by: ' + pattern, 'error');
                        blocked = true;
                    }
                }

                let warned = false;
                for (const pattern of GPU_WARNLIST) {
                    if (pattern.test(renderer)) {
                        log(sec3, '⚠️ WARNED by: ' + pattern, 'warning');
                        warned = true;
                    }
                }

                if (!blocked && !warned) {
                    log(sec3, '✅ GPU is COMPATIBLE', 'success');
                    log(sec3, '→ Not in blocklist or warnlist');
                }

                // Test 4: Final Decision
                const sec4 = addSection('Step 4: Expected Behavior');
                if (blocked || warned) {
                    log(sec4, '🔵 Expected: CPU delegate (~4 FPS)', 'warning');
                    log(sec4, 'Reason: GPU in blocklist/warnlist');
                } else {
                    log(sec4, '🟢 Expected: GPU delegate (~30 FPS)', 'success');
                    log(sec4, 'Reason: Compatible GPU detected');
                }

                // Test 5: WebGL Capabilities
                const sec5 = addSection('Step 5: WebGL Capabilities');
                log(sec5, 'Max Texture Size: ' + gl.getParameter(gl.MAX_TEXTURE_SIZE));
                log(sec5, 'Max Viewport: ' + gl.getParameter(gl.MAX_VIEWPORT_DIMS));
                log(sec5, 'Max Vertex Attribs: ' + gl.getParameter(gl.MAX_VERTEX_ATTRIBS));
                log(sec5, 'Shading Language: ' + gl.getParameter(gl.SHADING_LANGUAGE_VERSION));
            } else {
                log(sec2, '❌ WEBGL_debug_renderer_info not available', 'error');
            }

            // Cleanup
            const loseCtx = gl.getExtension('WEBGL_lose_context');
            if (loseCtx) loseCtx.loseContext();
        }

        // Instructions
        const sec6 = addSection('📋 How to Use This Debug Info');
        log(sec6, '1. Check Step 1: Did failIfMajorPerformanceCaveat fail?');
        log(sec6, '   - If YES (RDNA3): The fix should allow GPU mode anyway');
        log(sec6, '   - If NO: GPU should work without issues');
        log(sec6, '');
        log(sec6, '2. Check Step 2: Is renderer "AMD Radeon RX 7900 XTX" or similar?');
        log(sec6, '');
        log(sec6, '3. Check Step 3: Is GPU blocked or warned?');
        log(sec6, '   - Should be ✅ COMPATIBLE for RDNA3');
        log(sec6, '');
        log(sec6, '4. Open main dashboard and enable eye tracking');
        log(sec6, '   - Open DevTools Console (F12)');
        log(sec6, '   - Set filter to "Verbose" level');
        log(sec6, '   - Look for: "GPU detection: canUseGPU=true"');
        log(sec6, '   - Look for: "FaceLandmarker ready (GPU, VIDEO mode)"');
        log(sec6, '   - Status badge should show: "EYE TRACKING (GPU ~30fps)"');
    </script>
</body>
</html>
